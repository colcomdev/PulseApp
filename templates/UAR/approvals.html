<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Requests & Approvals</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #1a0000, #2b0000);
    color: #fff;
    font-family: "Segoe UI", sans-serif;
}

.topbar {
    background: rgba(10,0,0,0.95);
    border-bottom: 1px solid #8b0000;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
}

.brand { color: #ff1a1a; font-weight: bold; }

.nav-links a { color: #fff; margin-left: 15px; text-decoration: none; }
.nav-links a:hover { color: #ff1a1a; }

.card {
    background: rgba(20,0,0,0.85);
    border: 1px solid #8b0000;
    box-shadow: 0 0 20px rgba(255,0,0,0.2);
    border-radius: 12px;
}

.table {
    color: #fff;
}

.table thead {
    background: #3b0000;
}

.badge-pending { background: orange; }
.badge-approved { background: green; }
.badge-rejected { background: red; }

.btn-red {
    background: #b30000;
    border: none;
}

.btn-red:hover { background: #ff0000; }
</style>
</head>
<body>

<div class="topbar">
    <div class="brand">Enterprise Access Portal</div>
    <div class="nav-links">
        <a href="#">Dashboard</a>
        <a href="#">My Requests</a>
        <a href="#">Approvals</a>
        <a href="#">Logout</a>
    </div>
</div>

<div class="container py-5">

<!-- MY REQUESTS -->
<div class="card p-4 mb-5">
    <h4 class="mb-3">My Requests</h4>

    <table class="table table-dark table-hover">
        <thead>
            <tr>
                <th>ID</th>
                <th>System</th>
                <th>Access</th>
                <th>Status</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>#001</td>
                <td>ERP</td>
                <td>Admin</td>
                <td><span class="badge badge-pending">Pending</span></td>
                <td>2026-04-22</td>
            </tr>
            <tr>
                <td>#002</td>
                <td>HR</td>
                <td>Read</td>
                <td><span class="badge badge-approved">Approved</span></td>
                <td>2026-04-20</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- APPROVALS -->
<div class="card p-4">
    <h4 class="mb-3">Pending Approvals</h4>

    <table class="table table-dark table-hover">
        <thead>
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>System</th>
                <th>Access</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>#010</td>
                <td>John Doe</td>
                <td>Finance</td>
                <td>Write</td>
                <td>
                    <button class="btn btn-success btn-sm">Approve</button>
                    <button class="btn btn-danger btn-sm">Reject</button>
                </td>
            </tr>
            <tr>
                <td>#011</td>
                <td>Jane Smith</td>
                <td>CRM</td>
                <td>Admin</td>
                <td>
                    <button class="btn btn-success btn-sm">Approve</button>
                    <button class="btn btn-danger btn-sm">Reject</button>
                    <a href=\"{% url 'request_detail' req.id %}\" class=\"btn btn-red btn-sm\">Review</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</div>

</body>
</html>
