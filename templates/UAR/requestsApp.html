<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Access Request</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1a0000, #2b0000, #3b0000);
            color: #fff;
            font-family: "Segoe UI", sans-serif;
        }

        /* HEADER BAR */
        .topbar {
            background: rgba(10, 0, 0, 0.95);
            border-bottom: 1px solid #8b0000;
            box-shadow: 0 0 15px rgba(255,0,0,0.2);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar .brand {
            font-weight: bold;
            color: #ff1a1a;
            text-shadow: 0 0 10px red;
            font-size: 18px;
        }

        .topbar .nav-links a {
            color: #fff;
            margin-left: 15px;
            text-decoration: none;
            font-size: 14px;
        }

        .topbar .nav-links a:hover {
            color: #ff1a1a;
            text-shadow: 0 0 5px red;
        }

        .card {
            background: rgba(20, 0, 0, 0.85);
            border: 1px solid #8b0000;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.2);
            border-radius: 15px;
        }

        .stepper {
            color:#fff;
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .step {
            color:#fff;
            flex: 1;
            text-align: center;
            position: relative;
        }

        .step span {
            display: inline-block;
            width: 35px;
            height: 35px;
            line-height: 35px;
            border-radius: 50%;
            background: #3b0000;
            border: 2px solid #8b0000;
            color: #fff;
            font-weight: bold;
        }

        .step.active span {
            background: #ff0000;
            box-shadow: 0 0 15px red;
        }

        .step p {
            margin-top: 8px;
            font-size: 13px;
        }

        input, select, textarea {
            background: #2b0000 !important;
            border: 1px solid #8b0000 !important;
            color: #fff !important;
        }

        textarea:focus, input:focus, select:focus {
            box-shadow: 0 0 10px red !important;
        }

        .btn-red {
            background: #b30000;
            border: none;
        }

        .btn-red:hover {
            background: #ff0000;
            box-shadow: 0 0 10px red;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="topbar">
    <div class="brand">Enterprise Access Portal</div>
    <div class="nav-links">
        <a href="#">Dashboard</a>
        <a href="#">My Requests</a>
        <a href="#">Approvals</a>
        <a href="#">Logout</a>
    </div>
</div>

<div class="container py-5">

    <h2 class="text-center mb-4" style="color:#ff1a1a; text-shadow:0 0 10px red;">
        User Access Request Portal
    </h2>

    <div class="card p-4">

        <!-- Stepper -->
        <div class="stepper mb-4">
            <div class="step active" id="s1"><span>1</span><p>System</p></div>
            <div class="step" id="s2"><span>2</span><p>Rights</p></div>
            <div class="step" id="s3"><span>3</span><p>Justification</p></div>
            <div class="step" id="s4"><span>4</span><p>Submit</p></div>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="step-content" id="step-1">
                <label>Select System</label>
                <select class="form-control mt-2">
                    <option>ERP System</option>
                    <option>HR Portal</option>
                    <option>Finance Dashboard</option>
                    <option>CRM System</option>
                </select>
            </div>

            <div class="step-content d-none" id="step-2">
                <label>Access Rights Requested</label>
                <select class="form-control mt-2">
                    <option>Read Only</option>
                    <option>Write Access</option>
                    <option>Admin Access</option>
                </select>
            </div>

            <div class="step-content d-none" id="step-3">
                <label>Justification</label>
                <textarea class="form-control mt-2" rows="4"></textarea>
            </div>

            <div class="step-content d-none" id="step-4">
                <label>Comments</label>
                <textarea class="form-control mt-2" rows="3"></textarea>

                <div class="form-check mt-3">
                    <input class="form-check-input" type="checkbox" id="sign">
                    <label class="form-check-label" for="sign">I confirm and digitally sign this request</label>
                </div>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <button type="button" class="btn btn-secondary" id="backBtn" onclick="prevStep()">Back</button>
                <button type="button" class="btn btn-red" id="nextBtn" onclick="nextStep()">Next</button>
                <button type="submit" class="btn btn-red d-none" id="submitBtn">Submit</button>
            </div>

        </form>

    </div>
</div>

<script>
    let currentStep = 1;

    function showStep(step) {
        for (let i = 1; i <= 4; i++) {
            document.getElementById('step-' + i).classList.add('d-none');
            document.getElementById('s' + i).classList.remove('active');
        }

        document.getElementById('step-' + step).classList.remove('d-none');
        document.getElementById('s' + step).classList.add('active');

        document.getElementById('backBtn').style.display = step === 1 ? 'none' : 'inline-block';
        document.getElementById('nextBtn').style.display = step === 4 ? 'none' : 'inline-block';
        document.getElementById('submitBtn').classList.toggle('d-none', step !== 4);
    }

    function nextStep() {
        if (currentStep < 4) {
            currentStep++;
            showStep(currentStep);
        }
    }

    function prevStep() {
        if (currentStep > 1) {
            currentStep--;
            showStep(currentStep);
        }
    }

    showStep(currentStep);
</script>

</body>
</html>
